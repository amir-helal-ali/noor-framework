# ============================================================
# Noor Framework - Monitoring Stack
# Prometheus + Grafana configuration
# ============================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'noor-monitor'

# Alertmanager
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

# Rules
rule_files:
  - "alerts.yml"

# Scrape configurations
scrape_configs:
  # Noor Application
  - job_name: 'noor-app'
    metrics_path: '/metrics'
    scheme: http
    static_configs:
      - targets: ['noor-app:8080']
        labels:
          service: 'noor'
          environment: 'production'
    
    # Custom labels per target
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '([^:]+)(?::\d+)?'
        replacement: '${1}'

  # PostgreSQL Exporter
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']

  # Node Exporter (system metrics)
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']

  # Redis Exporter (if using Redis)
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: 'go_.*'
        action: drop

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Grafana
  - job_name: 'grafana'
    static_configs:
      - targets: ['grafana:3000']

  # Docker monitoring
  - job_name: 'docker'
    static_configs:
      - targets: ['cadvisor:8080']
